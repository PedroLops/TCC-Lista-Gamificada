<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Level Up!</title>
    <link rel="stylesheet" href="css/lv-up1.css">
</head>
<body>

    <div class="level-up-container">
        <h1 class="title-animation">LEVEL UP!</h1>

        <div class="image-wrapper">
            <img src="img/badge-lv-up.png" alt="Level Up Badge" class="character-img">
            <div class="glow-effect"></div>
        </div>

        <div class="xp-section">
            <div class="xp-info">
                <span id="level-text">Level 3</span>
                <span>Aventureiro Perito</span>
                
            </div>
            <div class="xp-bar-container">
                <div class="xp-bar-fill"></div>
            </div>
        </div>

        <button class="btn-next" onclick="window.location.href='lista-questoes3.html'">
            Seguir para próxima fase
        </button>
    </div>

</body>
</html>
