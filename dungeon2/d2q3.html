<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Missão 02</title>
    <link rel="stylesheet" href="../css/d2questao.css">
    <script src="../js/d2q3.js"></script>
</head>
<body>
    <div class="question-header">
        <h2>Questão 03</h2>
        <p class="text-bold">Uma startup decide atender “todo tipo de cliente” para aumentar vendas. Esse comportamento geralmente indica:</p>
        <p class="text-normal">
            a- Boa estratégia de escala.<br>
            b- Domínio de mercado.<br>
            c- Alta segmentação.<br>
            d- Falta de definição de nicho

        </p>
    </div>

    <div class="banner-batalha">
        <div class="alvos">
            <button class="btn-attack" id="btn-a">Atacar alvo (a)</button>
            <img src="../img/goblin1.png" alt="Alvo A">
        </div>
        <div class="alvos">
            <button class="btn-attack" id="btn-b">Atacar alvo (b)</button>
            <img src="../img/goblin1.png" alt="Alvo B">
        </div>
        <div class="alvos">
            <button class="btn-attack" id="btn-c">Atacar alvo (c)</button>
            <img src="../img/goblin1.png" alt="Alvo C">
        </div>
        <div class="alvos">
            <button class="btn-attack" id="btn-d">Atacar alvo (d)</button>
            <img src="../img/goblin1.png" alt="Alvo D">
        </div>
    </div>

    <div class="banner-mapa">
        <p>Seu progresso na missão:</p>
        <img src="../img/Mapa-Dungeon-q1.png" class="map-image" alt="Mapa">
    </div>
</body>

</html>
