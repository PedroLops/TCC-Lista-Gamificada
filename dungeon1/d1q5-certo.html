<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Resultado da Missão</title>
    <link rel="stylesheet" href="../css/d1acerto.css">
</head>
<body>

    <div class="feedback-container">
        <h2>ACERTOU O ALVO!</h2>
        <p>Parabéns! Você acertou o alvo com a resposta correta. Essas são suas recompensas e seu progresso na missão. Passe para a próxima questão.</p>
    </div>

    <div class="banner-resultado-wrapper">
        <div class="banner-imagem-container">
            </div>
        <div class="recompensas-container">
            <span class="xp">+10xp</span>
            <br>
            <span class="gold">+5Gold</span>
        </div>
    </div>

    <div class="banner-mapa-resultado">
        <p>Seu progresso na missão:</p>
        <div class="mapa-flex-container">
            <div class="mapa-img-box">
                <img src="../img/Mapa-Dungeon-q5.png" class="map-image-resultado" alt="Mapa">
            </div>
            <a href="../lv-up1.html" style="text-decoration: none;">
                <button class="btn-proxima">Próxima Questão</button>
            </a>
        </div>
    </div>

</body>
</html>
